<main class="compact">
  <section>
    <h2 class="qr-title">Resume</h2>
    <div class="qr-container">
      {% include qr-resume.html %}
    </div>
  </section>
  <section>
    <h2 class="qr-title">Website</h2>
    <div class="qr-container">
      {% include qr-website.html %}
    </div>
  </section>
</main>
<script>
  window.addEventListener('scroll', () => {
  clearTimeout(window.snapTimeout);
  window.snapTimeout = setTimeout(() => {
    const sections = document.querySelectorAll('main > section');
    const scrollY = window.scrollY;
    let nearest = null;
    let minDist = Infinity;

    sections.forEach(section => {
      const offset = section.offsetTop;
      const dist = Math.abs(scrollY - offset);
      if (dist < minDist) {
        minDist = dist;
        nearest = offset;
      }
    });

    if (minDist < 100) { // <— custom snap sensitivity threshold
      window.scrollTo({ top: nearest, behavior: 'smooth' });
    }
  }, 100);
});

</script>
